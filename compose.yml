services:
  app:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - .:/workspace:cached
    environment:
      APP_ENV: development
      RUN_MIGRATIONS: "0"
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/quillcv_dev
    ports:
      - "8000:8000"
    env_file:
      - path: ./.env
        required: false
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: quillcv_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d quillcv_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
