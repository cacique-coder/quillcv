<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuillCV — ATS-Optimized CV Builder</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <script src="https://unpkg.com/htmx.org@2.0.2"></script>
</head>
<body>
    <header class="site-header">
        <nav class="site-nav">
            <a href="/app" class="nav-link">Generate CV</a>
            <a href="/demo" class="nav-link">Browse Templates</a>
            <a href="/pricing" class="nav-link">Pricing</a>
            {% if user %}
                <span class="nav-credits" title="Credits remaining">{{ balance|default(0) }} credits</span>
                <a href="/logout" class="nav-link">Sign Out</a>
            {% else %}
                <a href="/login" class="nav-link">Sign In</a>
            {% endif %}
        </nav>
        <div class="brand">
            <svg class="brand-quill" viewBox="0 0 80 60" width="36" height="27" aria-hidden="true">
                <path d="M40 2 L68 54 C62 58, 54 56, 48 46 L40 30 L32 46 C26 56, 18 58, 12 54 Z"
                      fill="var(--accent)"/>
            </svg>
            <div class="brand-text">
                <h1 class="brand-name"><a href="/">QuillCV</a></h1>
                <p class="brand-tagline">ATS-optimized CVs tailored to job descriptions</p>
            </div>
        </div>
        <!-- Sketchy underline -->
        <svg class="header-underline" viewBox="0 0 400 6" preserveAspectRatio="none" aria-hidden="true">
            <path d="M0 3 Q40 0, 80 3 T160 3 T240 3 T320 3 T400 3" fill="none"
                  stroke="var(--border)" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
