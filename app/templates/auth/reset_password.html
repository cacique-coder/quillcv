{% extends "base.html" %}

{% block title %}Reset Password — QuillCV{% endblock %}
{% block app_nav %}{% endblock %}
{% block head_extra %}<meta name="robots" content="noindex, follow">{% endblock %}

{% block content %}
<section class="auth-page">
  <div class="auth-card">
    <h2>Choose a new password</h2>

    {% if errors %}
    <div class="auth-errors">
      {% for error in errors %}
      <p>{{ error }}</p>
      {% endfor %}
    </div>
    {% endif %}

    <form method="post" action="/reset-password" class="auth-form">
      <input type="hidden" name="csrf_token" value="{{ request.state.csrf_token }}">
      <input type="hidden" name="token" value="{{ token }}">

      <div class="form-field">
        <label for="password">New password</label>
        <input
          type="password"
          id="password"
          name="password"
          required
          minlength="8"
          autocomplete="new-password"
          placeholder="At least 8 characters"
        >
      </div>

      <div class="form-field">
        <label for="confirm_password">Confirm new password</label>
        <input
          type="password"
          id="confirm_password"
          name="confirm_password"
          required
          minlength="8"
          autocomplete="new-password"
          placeholder="Repeat your password"
        >
      </div>

      <button type="submit" class="btn-cta btn-cta--full">Reset password</button>
    </form>
  </div>
</section>
{% endblock %}
