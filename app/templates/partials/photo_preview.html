{# Primary swap target: #photo-result (hidden, just holds the path) #}
<input type="hidden" name="photo_path" id="photo-path-result" value="{{ photo_path }}">
<input type="hidden" name="user_id" value="{{ user_id }}">

{# OOB swap: update the on-sheet photo slot #}
<div id="sheet-photo" class="sheet-photo" hx-swap-oob="true">
  <img src="/photos/serve/{{ photo_path }}" alt="Profile photo" id="sheet-photo-img">
  <button type="button" class="sheet-photo-replace"
          onclick="document.getElementById('photo-input').click()"
          aria-label="Replace profile photo">Replace</button>
</div>
