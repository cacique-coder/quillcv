{% set steps = [
    (1, "i", "Country"),
    (2, "ii", "Details"),
    (3, "iii", "Documents"),
    (4, "iv", "Generate"),
] %}
<div class="wiz-tabs">
    {% for num, roman, label in steps %}
    {% set state = "done" if step > num else ("on" if step == num else "") %}
    <div class="wiz-tab {{ state }}">
        <div class="n">{{ roman }}.</div>
        <div class="t">{{ label }}</div>
    </div>
    {% endfor %}
</div>
