<div class="change-template-picker">
    <h3>Choose a different template</h3>
    <p class="hint">Selecting a new template will reset your CV to draft and require regeneration (uses a credit).</p>

    <form method="post" action="/jobs/{{ job.id }}/change-template">
        <input type="hidden" name="csrf_token" value="{{ request.state.csrf_token }}">
        <div class="template-grid" style="margin: 1rem 0;">
            {% set selected_tpl = selected_template %}
            {% set recommended = [] %}
            {% for tpl in templates %}
            {% include "partials/wizard/_template_card.html" %}
            {% endfor %}
        </div>
        <div class="panel-actions" style="margin-top: 1rem;">
            <a href="/jobs/{{ job.id }}" class="btn-back">Cancel</a>
            <button type="submit" class="btn-generate">
                Apply &amp; Regenerate &#8594;
            </button>
        </div>
    </form>
</div>
