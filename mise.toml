[tools]
# Pin to match the production/dev container Dockerfile (`python:3.14-slim`).
python = "3.14"

# Env applied whenever you're inside this project (mise auto-activates).
# Points the host-mode app at the docker-exposed Postgres on localhost; the
# in-compose app service overrides this via its own `environment:` block, so
# `docker compose up app` is unaffected.
[env]
DATABASE_URL = "postgresql+asyncpg://postgres:postgres@localhost:5432/quillcv_dev"
PYTHONUNBUFFERED = "1"

[tasks.dev]
description = "Run db (docker) + web (uvicorn on host) via honcho"
run = "honcho start -f Procfile.dev"

[tasks."dev:db"]
description = "Run only the Postgres container (foreground, ctrl-C to stop)"
run = "docker compose up db"

[tasks."dev:web"]
description = "Run only uvicorn on the host (assumes db is already up)"
run = "uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

[tasks."dev:docker"]
description = "Full docker-compose dev stack (db + app together)"
run = "docker compose up"

[tasks.install]
description = "Install Python dependencies"
run = "python -m pip install -r requirements.txt"

[tasks.lint]
description = "Run ruff linter"
run = "ruff check app/ tests/"

[tasks.lint-fix]
description = "Auto-fix lint issues"
run = "ruff check --fix app/ tests/"

[tasks.security]
description = "Run bandit security scanner"
run = "bandit -r app/ -c pyproject.toml"

[tasks.audit]
description = "Check dependencies for known CVEs"
run = "python -m pip_audit -r requirements.txt"

[tasks.test]
description = "Run unit + integration tests with branch coverage"
run = "python -m pytest tests/unit tests/integration --cov=app --cov-branch --cov-report=term-missing --cov-report=html"

[tasks."test:unit"]
description = "Run only unit tests (fast, no DB/HTTP)"
run = "python -m pytest tests/unit -q --no-cov"

[tasks."test:integration"]
description = "Run only integration tests (ASGI + in-memory DB)"
run = "python -m pytest tests/integration -q --no-cov"

[tasks."test:e2e"]
description = "Run end-to-end tests against a running uvicorn server"
run = "python -m pytest tests/e2e -q --no-cov"

[tasks.check]
description = "Run all quality checks (lint + security + audit)"
run = [
  "ruff check app/ tests/",
  "bandit -r app/ -c pyproject.toml",
  "python -m pip_audit -r requirements.txt",
]
