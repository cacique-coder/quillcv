service: quillcv
image: cacique-coder/quillcv

servers:
  web:
    hosts:
      - 209.38.30.185

proxy:
  ssl: true
  host: quillcv.com
  app_port: 8000
  healthcheck:
    interval: 5
    path: /up
    timeout: 30

registry:
  server: ghcr.io
  username:
    - KAMAL_REGISTRY_USERNAME
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64

env:
  clear:
    APP_ENV: production
    LLM_PROVIDER: gemini
    PYTHONUNBUFFERED: "1"
  secret:
    - DATABASE_URL
    - SESSION_SECRET
    - ENCRYPTION_KEY
    - JWT_SECRET
    - ANTHROPIC_API_KEY
    - GOOGLE_API_KEY
    - STRIPE_SECRET_KEY
    - STRIPE_WEBHOOK_SECRET

aliases:
  console: app exec -i 'python -i console.py'
  dbconsole: app exec -i 'python -c "import asyncio; from app.database import engine; from sqlalchemy import text; asyncio.run(engine.dispose())" && psql $DATABASE_URL'
  logs: app logs -f
  migrate: app exec 'python -c "from alembic.config import Config; from alembic import command; command.upgrade(Config(\"alembic.ini\"), \"head\")"'
  migrate-status: app exec 'python -c "from alembic.config import Config; from alembic import command; command.current(Config(\"alembic.ini\"), verbose=True)"'

accessories:
  db:
    image: postgres:18-alpine
    host: 209.38.30.185
    env:
      clear:
        POSTGRES_DB: quillcv_production
        POSTGRES_USER: quillcv
      secret:
        - POSTGRES_PASSWORD
    directories:
      - quillcv-pgdata:/var/lib/postgresql
