services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/quillcv_dev
    env_file:
      - path: ../.env
        required: false
    depends_on:
      db:
        condition: service_healthy
    # Keep container alive so VS Code / Claude Code can attach;
    # the CMD in the Dockerfile runs uvicorn, but devcontainers can
    # override the command via postStartCommand if preferred.
    command: sleep infinity

  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: quillcv_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d quillcv_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
